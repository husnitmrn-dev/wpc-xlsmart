<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Database WPC-XLSMART</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:Inter,sans-serif}</style>
</head>
<body class="bg-slate-50 min-h-screen">
<div class="max-w-[1400px] mx-auto p-6">
<div class="bg-white rounded-2xl border shadow-sm p-6 mb-6 flex justify-between flex-wrap gap-4">
<div><h1 class="text-2xl font-bold text-slate-900">Database WPC-XLSMART</h1><p class="text-sm text-slate-500">Manpower Management - Idle / Dedicated</p></div>
<div class="flex gap-2"><div class="bg-amber-50 border border-amber-200 rounded-xl px-4 py-2 text-center"><div class="text-[10px] font-medium text-amber-700">IDLE</div><div id="cIdle" class="font-bold text-amber-900">0</div></div><div class="bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-2 text-center"><div class="text-[10px] font-medium text-emerald-700">DEDICATED</div><div id="cDed" class="font-bold text-emerald-900">0</div></div><div class="bg-slate-900 text-white rounded-xl px-5 py-2 text-center"><div class="text-[10px] opacity-60">TOTAL</div><div id="cTotal" class="font-bold">0</div></div></div>
</div>

<div class="bg-white rounded-2xl border shadow-sm p-6 mb-6">
<h2 id="formTitle" class="font-semibold text-slate-900 mb-4">Tambah Data Baru</h2>
<form id="mainForm" class="grid md:grid-cols-3 gap-4">
<div><label class="text-xs font-semibold text-slate-600">Nama *</label><input id="fNama" required class="w-full mt-1.5 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900" placeholder="Nama lengkap"></div>
<div><label class="text-xs font-semibold text-slate-600">Posisi Terakhir *</label><input id="fPosisi" required class="w-full mt-1.5 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900" placeholder="Engineer, Rigger..."></div>
<div><label class="text-xs font-semibold text-slate-600">Current Status *</label><select id="fStatus" class="w-full mt-1.5 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm bg-white"><option value="Idle">Idle</option><option value="Dedicated">Dedicated</option></select></div>

<div><label class="text-xs font-semibold text-slate-600">Project *</label><select id="fProjectType" class="w-full mt-1.5 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm bg-white"><option value="Blank">Blank</option><option value="Input">Input</option></select><input id="fProjectName" placeholder="Ketik nama project, ex: Project FTM" class="hidden w-full mt-2 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm"></div>
<div><label class="text-xs font-semibold text-slate-600">Current Subcont *</label><input id="fSubcont" required class="w-full mt-1.5 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900" placeholder="PT ... / Vendor ..."></div>
<div><label class="text-xs font-semibold text-slate-600">Link CV</label><div class="flex gap-1 mt-1.5 bg-slate-100 p-1 rounded-xl w-fit"><button type="button" id="tabLink" class="px-3 py-1.5 text-xs font-medium bg-white shadow rounded-lg">Link URL</button><button type="button" id="tabFile" class="px-3 py-1.5 text-xs font-medium rounded-lg">Upload File</button></div><input id="fLink" class="w-full mt-2 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm" placeholder="https://drive.google.com/..."><div id="fileDrop" class="hidden mt-2 border-2 border-dashed border-slate-200 rounded-xl p-4 text-center"><input type="file" id="fFile" accept=".pdf,.doc,.docx" class="hidden"><label for="fFile" class="cursor-pointer text-xs">Drag & drop atau <span class="underline font-semibold">pilih file</span><br><span class="text-[11px] text-slate-400">PDF, DOC, DOCX</span></label><div id="fileInfo" class="mt-2 text-xs font-medium text-slate-800"></div></div></div>

<div class="md:col-span-3"><label class="text-xs font-semibold text-slate-600">Catatan</label><textarea id="fCatatan" rows="2" class="w-full mt-1.5 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm" placeholder="Optional..."></textarea></div>
<div class="md:col-span-3 flex gap-2 pt-2"><button class="bg-slate-900 hover:bg-black text-white px-6 py-2.5 rounded-xl text-sm font-medium">Simpan Data</button><button type="button" id="bCancel" class="hidden border border-slate-200 px-6 py-2.5 rounded-xl text-sm">Batal Edit</button><button type="button" id="bExport" class="ml-auto border border-slate-200 px-4 py-2.5 rounded-xl text-sm font-medium">Export CSV</button></div>
</form>
</div>

<div class="bg-white rounded-2xl border shadow-sm p-4 mb-4 flex flex-wrap gap-3">
<input id="fSearch" placeholder="Cari nama / posisi / subcont / project..." class="border border-slate-200 rounded-xl px-4 py-2.5 text-sm w-full md:w-96 focus:outline-none focus:ring-2 focus:ring-slate-900">
<select id="filterStatus" class="border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm bg-white"><option value="All">Semua Status</option><option value="Idle">Idle</option><option value="Dedicated">Dedicated</option></select>
<select id="filterProject" class="border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm bg-white"><option value="All">Semua Project</option><option value="Blank">Blank</option></select>
</div>

<div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
<div class="overflow-auto">
<table class="w-full text-sm"><thead class="bg-slate-50 text-[11px] font-semibold text-slate-500 uppercase tracking-wide"><tr><th class="px-4 py-3 text-left">No</th><th class="px-4 py-3 text-left">Nama</th><th class="px-4 py-3 text-left">Posisi Terakhir</th><th class="px-4 py-3 text-left">Current Status</th><th class="px-4 py-3 text-left">Project</th><th class="px-4 py-3 text-left">Current Subcont</th><th class="px-4 py-3 text-left">CV</th><th class="px-4 py-3 text-left">Tgl</th><th class="px-4 py-3 text-left">Aksi</th></tr></thead><tbody id="tbody"></tbody></table>
<div id="empty" class="py-20 text-center"><div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3 text-xl">📂</div><div class="font-semibold text-slate-900">Belum ada data WPC-XLSMART</div><div class="text-xs text-slate-500 mt-1">Database awal kosong, tambahkan data pertama di form atas</div></div>
</div>
</div>
</div>
<script>
let data=[],editId=null,cvMode='link',tempFile=null;
const $=id=>document.getElementById(id);
const fmt=()=>new Date().toLocaleDateString('id-ID');
function render(){
 const s=$('fSearch').value.toLowerCase(), fs=$('filterStatus').value, fp=$('filterProject').value;
 let filtered=data.filter(d=>(d.nama+d.posisi+d.subcont+d.project).toLowerCase().includes(s) && (fs==='All'||d.status===fs) && (fp==='All'||d.project===fp));
 $('tbody').innerHTML=''; $('empty').style.display=filtered.length?'none':'block';
 $('cTotal').textContent=data.length; $('cIdle').textContent=data.filter(d=>d.status==='Idle').length; $('cDed').textContent=data.filter(d=>d.status==='Dedicated').length;
 const projSet=[...new Set(data.map(d=>d.project))].filter(p=>p!=='Blank');
 const sel=$('filterProject'); const cur=sel.value;
 sel.innerHTML='<option value="All">Semua Project</option><option value="Blank">Blank</option>'+projSet.map(p=>`<option value="${p}">${p}</option>`).join('');
 if([...sel.options].some(o=>o.value===cur)) sel.value=cur;
 filtered.forEach((d,i)=>{
  const tr=document.createElement('tr'); tr.className='border-t border-slate-100 hover:bg-slate-50/70';
  tr.innerHTML=`<td class="px-4 py-3.5 text-slate-600">${i+1}</td><td class="px-4 py-3.5 font-medium text-slate-900">${d.nama}</td><td class="px-4 py-3.5">${d.posisi}</td><td class="px-4 py-3.5"><span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium ${d.status==='Idle'?'bg-amber-100 text-amber-800 border border-amber-200':'bg-emerald-100 text-emerald-800 border border-emerald-200'}"><span class="w-1.5 h-1.5 rounded-full ${d.status==='Idle'?'bg-amber-500':'bg-emerald-500'}"></span>${d.status}</span></td><td class="px-4 py-3.5"><span class="px-2.5 py-1 rounded-full text-xs font-medium ${d.project==='Blank'?'bg-slate-100 text-slate-600':'bg-blue-50 text-blue-700 border border-blue-200'}">${d.project}</span></td><td class="px-4 py-3.5">${d.subcont}</td><td class="px-4 py-3.5">${d.link?`<a href="${d.link}" target="_blank" class="inline-flex px-2.5 py-1 bg-blue-50 text-blue-700 rounded-lg text-xs border border-blue-200 hover:bg-blue-100">Lihat</a>`: (d.fileName?`<a href="${d.fileUrl}" target="_blank" class="inline-flex px-2.5 py-1 bg-blue-50 text-blue-700 rounded-lg text-xs border border-blue-200">${d.fileName}</a>`:'<span class="text-slate-300">-</span>')}</td><td class="px-4 py-3.5 text-xs text-slate-500">${d.tgl}</td><td class="px-4 py-3.5 flex gap-1"><button onclick="editData(${d.id})" class="border border-slate-200 rounded-lg px-2.5 py-1 text-xs hover:bg-white">Edit</button><button onclick="delData(${d.id})" class="border border-red-200 text-red-600 rounded-lg px-2.5 py-1 text-xs hover:bg-red-50">Hapus</button></td>`;
  $('tbody').appendChild(tr);
 });
}
$('fProjectType').onchange=e=>{ if(e.target.value==='Input'){ $('fProjectName').classList.remove('hidden'); $('fProjectName').required=true; $('fProjectName').focus(); } else { $('fProjectName').classList.add('hidden'); $('fProjectName').required=false; } };
$('tabLink').onclick=()=>{ cvMode='link'; $('tabLink').className='px-3 py-1.5 text-xs font-medium bg-white shadow rounded-lg'; $('tabFile').className='px-3 py-1.5 text-xs font-medium rounded-lg text-slate-500'; $('fLink').classList.remove('hidden'); $('fileDrop').classList.add('hidden'); };
$('tabFile').onclick=()=>{ cvMode='file'; $('tabFile').className='px-3 py-1.5 text-xs font-medium bg-white shadow rounded-lg'; $('tabLink').className='px-3 py-1.5 text-xs font-medium rounded-lg text-slate-500'; $('fLink').classList.add('hidden'); $('fileDrop').classList.remove('hidden'); };
$('fFile').onchange=e=>{ const f=e.target.files[0]; if(!f) return; tempFile=f; $('fileInfo').textContent=f.name+' ('+(f.size/1024).toFixed(0)+' KB)'; };
$('mainForm').onsubmit=e=>{
 e.preventDefault();
 const project=$('fProjectType').value==='Blank'?'Blank':$('fProjectName').value.trim();
 if($('fProjectType').value==='Input'&&!project){ alert('Nama project wajib diisi'); return; }
 let fd={}; if(cvMode==='file'&&tempFile) fd={fileName:tempFile.name,fileUrl:URL.createObjectURL(tempFile)};
 const obj={id:editId??Date.now(),nama:$('fNama').value.trim(),posisi:$('fPosisi').value.trim(),status:$('fStatus').value,project,subcont:$('fSubcont').value.trim(),link:cvMode==='link'?$('fLink').value.trim():'',...fd,catatan:$('fCatatan').value.trim(),tgl:fmt()};
 if(editId){ data=data.map(d=>d.id===editId?{...d,...obj,tgl:d.tgl}:d); editId=null; $('formTitle').textContent='Tambah Data Baru'; $('bCancel').classList.add('hidden'); }
 else data.push(obj);
 e.target.reset(); $('fProjectName').classList.add('hidden'); $('fileInfo').textContent=''; tempFile=null; $('tabLink').click(); render();
};
window.editData=id=>{ const d=data.find(x=>x.id===id); editId=id; $('fNama').value=d.nama; $('fPosisi').value=d.posisi; $('fStatus').value=d.status; $('fSubcont').value=d.subcont; $('fCatatan').value=d.catatan||''; if(d.project==='Blank'){ $('fProjectType').value='Blank'; $('fProjectName').classList.add('hidden'); } else { $('fProjectType').value='Input'; $('fProjectName').classList.remove('hidden'); $('fProjectName').value=d.project; } $('fLink').value=d.link||''; $('formTitle').textContent='Edit Data - '+d.nama; $('bCancel').classList.remove('hidden'); window.scrollTo({top:0,behavior:'smooth'}); };
window.delData=id=>{ if(confirm('Hapus data ini?')){ data=data.filter(d=>d.id!==id); render(); } };
$('bCancel').onclick=()=>{ editId=null; $('mainForm').reset(); $('formTitle').textContent='Tambah Data Baru'; $('bCancel').classList.add('hidden'); $('fProjectName').classList.add('hidden'); };
$('fSearch').oninput=render; $('filterStatus').onchange=render; $('filterProject').onchange=render;
$('bExport').onclick=()=>{ if(!data.length){ alert('Database masih kosong'); return; } const h=['No','Nama','Posisi Terakhir','Current Status','Project','Current Subcont','Link CV','Tgl Input','Catatan']; const rows=data.map((d,i)=>[i+1,d.nama,d.posisi,d.status,d.project,d.subcont,d.link||d.fileName||'',d.tgl,d.catatan||'']); const csv=[h,...rows].map(r=>r.map(v=>`"${(v+'').replace(/"/g,'""')}"`).join(',')).join('\n'); const b=new Blob([csv],{type:'text/csv'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download='Database_WPC-XLSMART.csv'; a.click(); };
render();
</script>
</body>
</html>
